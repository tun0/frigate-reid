name: Build and push image

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/build.yml
      - Dockerfile
      - reid_service.py
      - requirements.txt
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/tun0/frigate-reid/service
          tags: |
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDDHHmmss'}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Flux
        env:
          WEBHOOK_URL: ${{ secrets.FLUX_WEBHOOK_URL }}
          WEBHOOK_TOKEN: ${{ secrets.FLUX_WEBHOOK_TOKEN }}
        run: |
          PAYLOAD='{"action":"published"}'
          SIG=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_TOKEN" | awk '{print $NF}')
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: registry_package" \
            -H "X-Hub-Signature-256: sha256=$SIG" \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL"
