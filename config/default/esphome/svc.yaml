---
apiVersion: v1
kind: Service
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/hostname: esphome.local.tun0.eu
  labels:
    app: esphome
  name: esphome
  namespace: default
spec:
  ports:
  - port: 6052
    targetPort: http
    protocol: TCP
    name: http
  - port: 6053
    targetPort: api
    protocol: TCP
    name: api
  selector:
    app: esphome
  type: LoadBalancer
  loadBalancerIP: 192.168.178.212
  externalTrafficPolicy: Local
