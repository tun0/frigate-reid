---
apiVersion: v1
kind: Service
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/hostname: bazarr.local.tun0.eu
  labels:
    app: bazarr
  name: bazarr
  namespace: default
spec:
  ports:
  - name: bazarr
    port: 6767
    protocol: TCP
    targetPort: 6767
  - name: http
    port: 80
    protocol: TCP
    targetPort: 6767
  selector:
    app: bazarr
  type: LoadBalancer
  externalTrafficPolicy: Local
