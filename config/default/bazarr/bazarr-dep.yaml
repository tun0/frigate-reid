apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazarr
  namespace: default
  labels:
    app: bazarr
spec:
  selector:
    matchLabels:
      app: bazarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: bazarr
    spec:
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: bazarr
          image: linuxserver/bazarr:1.4.4 # {"$imagepolicy": "flux-system:bazarr-policy"}
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/Amsterdam
          ports:
            - containerPort: 6767
              name: http
              protocol: TCP
          resources:
            limits:
              #cpu: 200m
              memory: 350Mi
            requests:
              cpu: 10m
              memory: 230Mi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: movies
              mountPath: /movies
            - name: series
              mountPath: /series
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: bazarr-config
            # nfs:
            #   server: 192.168.178.1
            #   path: /mnt/usb2/K8S/APPS/bazarr/config
        - name: movies
          nfs:
            server: 192.168.178.167
            path: /mnt/everything/VIDEO/MOVIES
        - name: series
          nfs:
            server: 192.168.178.167
            path: /mnt/everything/VIDEO/SERIES
