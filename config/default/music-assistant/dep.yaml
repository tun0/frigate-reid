---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels: &labels
    app: &name music-assistant
  name: *name
  namespace: default
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: *labels
  template:
    metadata:
      labels: *labels
    spec:
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
      - name: app
        image: ghcr.io/music-assistant/server:2.8.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8095
        - containerPort: 8097
        resources: {}
        livenessProbe:
          tcpSocket:
            port: 8095
          initialDelaySeconds: 0
          failureThreshold: 3
          timeoutSeconds: 1
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8095
          initialDelaySeconds: 0
          failureThreshold: 3
          timeoutSeconds: 1
          periodSeconds: 10
        startupProbe:
          tcpSocket:
            port: 8095
          initialDelaySeconds: 0
          failureThreshold: 30
          timeoutSeconds: 1
          periodSeconds: 5
        volumeMounts:
          - name: data
            mountPath: /data
      dnsPolicy: ClusterFirstWithHostNet
      hostNetwork: true
      restartPolicy: Always
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: music-assistant-data
