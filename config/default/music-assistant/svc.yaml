---
apiVersion: v1
kind: Service
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/hostname: music-assistant.local.tun0.eu
  labels:
    app: &name music-assistant
  name: *name
  namespace: default
spec:
  ports:
  - port: 80
    targetPort: 8095
    protocol: TCP
    name: http
  - port: 8095
    targetPort: 8095
    protocol: TCP
    name: web
  - port: 8097
    targetPort: 8097
    protocol: TCP
    name: devices
  selector:
    app: *name
  type: LoadBalancer
  externalTrafficPolicy: Local
