apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: default
  labels:
    app: radarr
spec:
  selector:
    matchLabels:
      app: radarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: radarr
    spec:
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      # nodeName: saturn
      containers:
        - name: radarr
          image: linuxserver/radarr:develop-version-5.23.1.9914 # {"$imagepolicy": "flux-system:radarr-policy"}
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/Amsterdam
          ports:
            - containerPort: 6767
              name: http
              protocol: TCP
          resources:
            limits:
              #cpu: 200m
              memory: 2Gi
            requests:
              cpu: 10m
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads-sabnzbd
              mountPath: /downloads/sabnzbd
            - name: downloads-transmission
              mountPath: /downloads/transmission
            - name: movies
              mountPath: /movies
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: radarr-config
        - name: downloads-sabnzbd
          nfs:
            server: 192.168.178.1
            path: /mnt/ssd1/sabnzbd/downloads/complete
        - name: downloads-transmission
          nfs:
            server: 192.168.178.1
            path: /mnt/ssd1/transmission-downloads/completed/
        - name: movies
          nfs:
            server: 192.168.178.167
            path: /mnt/everything/VIDEO/MOVIES
