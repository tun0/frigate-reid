---
apiVersion: v1
kind: Service
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/hostname: radarr.local.tun0.eu
  labels:
    app: radarr
  name: radarr
  namespace: default
spec:
  ports:
  - name: radarr
    port: 7878
    protocol: TCP
    targetPort: 7878
  - name: http
    port: 80
    protocol: TCP
    targetPort: 7878
  selector:
    app: radarr
  type: LoadBalancer
  externalTrafficPolicy: Local
