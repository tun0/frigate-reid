---
apiVersion: v1
kind: Service
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/hostname: transmission.local.tun0.eu
  labels:
    app: transmission
  name: transmission
  namespace: default
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 9091
  selector:
    app: transmission
  type: LoadBalancer
  externalTrafficPolicy: Local
