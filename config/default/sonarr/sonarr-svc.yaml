---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: sonarr
  name: sonarr
  namespace: default
spec:
  ports:
  - name: sonarr
    port: 8989
    protocol: TCP
    targetPort: 8989
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8989
  selector:
    app: sonarr
  type: LoadBalancer
  loadBalancerIP: 192.168.178.214
  externalTrafficPolicy: Local
