---
apiVersion: v1
kind: Service
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/hostname: sonarr.local.tun0.eu
  labels:
    app: sonarr
  name: sonarr
  namespace: default
spec:
  ports:
  - name: sonarr
    port: 8989
    protocol: TCP
    targetPort: 8989
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8989
  selector:
    app: sonarr
  type: LoadBalancer
  externalTrafficPolicy: Local
