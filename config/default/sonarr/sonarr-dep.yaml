apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: default
  labels:
    app: sonarr
spec:
  selector:
    matchLabels:
      app: sonarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      # nodeName: saturn
      containers:
        - name: sonarr
          image: linuxserver/sonarr:3.0.10 # {"$imagepolicy": "flux-system:sonarr-policy"}
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/Amsterdam
          ports:
            - containerPort: 6767
              name: http
              protocol: TCP
          resources:
            limits:
              #cpu: 200m
              memory: 4Gi
            requests:
              cpu: 10m
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads-sabnzbd
              mountPath: /downloads/sabnzbd
            - name: downloads-transmission
              mountPath: /downloads/transmission
            - name: series
              mountPath: /series
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sonarr-config
        - name: downloads-sabnzbd
          nfs:
            server: 192.168.178.1
            path: /mnt/ssd1/sabnzbd/downloads/complete
        - name: downloads-transmission
          nfs:
            server: 192.168.178.1
            path: /mnt/ssd1/transmission-downloads/completed/
        - name: series
          nfs:
            server: 192.168.178.167
            path: /mnt/everything/VIDEO/SERIES
