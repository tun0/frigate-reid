---
apiVersion: v1
kind: Service
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/hostname: prowlarr.local.tun0.eu
  labels:
    app: prowlarr
  name: prowlarr
  namespace: default
spec:
  ports:
  - name: http
    port: 9696
    protocol: TCP
    targetPort: 9696
  selector:
    app: prowlarr
  type: LoadBalancer
  externalTrafficPolicy: Local
