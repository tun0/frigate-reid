---
apiVersion: v1
kind: Service
metadata:
  name: mariadb-spotweb
  namespace: default
  labels:
    app: mariadb-spotweb
spec:
  ports:
  - name: mysql
    port: 3306
    protocol: TCP
    targetPort: 3306
  selector:
    app: mariadb-spotweb
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb-spotweb
  namespace: default
  labels:
    app: mariadb-spotweb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb-spotweb
  serviceName: mariadb-spotweb
  template:
    metadata:
      labels:
        app: mariadb-spotweb
    spec:
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: spotweb
              topologyKey: kubernetes.io/hostname
      containers:
      - name: mariadb
        image: mariadb:11
        imagePullPolicy: IfNotPresent
        env:
        - name: MYSQL_DATABASE
          value: spotweb
        envFrom:
        - secretRef:
            name: spotweb
        ports:
        - containerPort: 3306
          name: mysql
          protocol: TCP
        resources:
          limits:
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
      dnsConfig:
        options:
        - name: ndots
          value: "1"
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: longhorn
      resources:
        requests:
          storage: 20Gi
