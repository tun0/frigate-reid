---
apiVersion: v1
kind: Service
metadata:
  name: spotweb-db
  namespace: default
  labels:
    app: spotweb-db
spec:
  ports:
  - name: mysql
    port: 3306
    protocol: TCP
    targetPort: 3306
  selector:
    app: spotweb-db
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: spotweb-db
  namespace: default
  labels:
    app: spotweb-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spotweb-db
  serviceName: spotweb-db
  template:
    metadata:
      labels:
        app: spotweb-db
    spec:
      containers:
      - name: mariadb
        image: mariadb:11
        imagePullPolicy: IfNotPresent
        env:
        - name: MYSQL_DATABASE
          value: spotweb
        envFrom:
        - secretRef:
            name: spotweb
        ports:
        - containerPort: 3306
          name: mysql
          protocol: TCP
        resources:
          limits:
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
      dnsConfig:
        options:
        - name: ndots
          value: "1"
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: longhorn
      resources:
        requests:
          storage: 20Gi
