apiVersion: apps/v1
kind: Deployment
metadata:
  name: jackett
  namespace: default
  labels:
    app: jackett
spec:
  selector:
    matchLabels:
      app: jackett
  template:
    metadata:
      labels:
        app: jackett
    spec:
      containers:
      - name: jackett
        image: linuxserver/jackett:0.20.770 # {"$imagepolicy": "flux-system:jackett-policy"}
        imagePullPolicy: IfNotPresent
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: Europe/Amsterdam
        ports:
        - containerPort: 6767
          name: http
          protocol: TCP
        resources:
          limits:
            cpu: 1000m
            memory: 350Mi
          requests:
            cpu: 10m
            memory: 230Mi
        volumeMounts:
        - name: config
          mountPath: /config
        - name: downloads
          mountPath: /downloads
      volumes:
      - name: config
        nfs:
          server: 192.168.178.1
          path: /mnt/usb2/K8S/APPS/jackett/config
      - name: downloads
        nfs:
          server: 192.168.178.1
          path: /mnt/ssd1/jackett-downloads
