apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  namespace: default
  labels:
    app: vaultwarden
spec:
  selector:
    matchLabels:
      app: vaultwarden
  template:
    metadata:
      labels:
        app: vaultwarden
    spec:
      containers:
      - name: vaultwarden
        image: vaultwarden/server:1.25.2-alpine
        imagePullPolicy: IfNotPresent
        securityContext:
          # capabilities:
          #   add:
          #   - NET_BIND_SERVICE
          sysctls:
          - name: net.ipv4.ip_unprivileged_port_start
            value: "1"
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        resources:
          limits:
            memory: 1024Mi
          requests:
            cpu: 50m
            memory: 512Mi
        volumeMounts:
        - name: data
          mountPath: /data
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      volumes:
      - name: data
        nfs:
          server: 192.168.178.1
          path: /mnt/usb2/K8S/APPS/vaultwarden/data
