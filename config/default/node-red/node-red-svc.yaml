---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: node-red
  name: node-red
  namespace: default
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.178.201
  externalTrafficPolicy: Local
  selector:
    app: node-red
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 1880
  - name: node-red
    port: 1880
    protocol: TCP
    targetPort: 1880
