---
apiVersion: v1
kind: Service
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/hostname: node-red.local.tun0.eu
  labels:
    app: node-red
  name: node-red
  namespace: default
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: node-red
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 1880
  - name: node-red
    port: 1880
    protocol: TCP
    targetPort: 1880
