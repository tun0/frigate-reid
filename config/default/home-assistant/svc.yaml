---
apiVersion: v1
kind: Service
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/hostname: hass.local.tun0.eu
  labels:
    app: home-assistant
  name: home-assistant
  namespace: default
spec:
  ports:
  - port: 8123
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: home-assistant
  type: LoadBalancer
  externalTrafficPolicy: Local
