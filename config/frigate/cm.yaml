---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frigate-config
  namespace: frigate
data:
  config.yml: |
    mqtt:
      enabled: false

    ffmpeg:
      hwaccel_args: preset-vaapi

    detectors:
      cpu1:
        type: cpu
        num_threads: 3

    cameras:
      voordeur:
        ffmpeg:
          inputs:
          - path: rtsp://${RTSP_USER}:${RTSP_PASS}@192.168.178.147:554/h264Preview_01_main
            roles:
            - record
          - path: rtsp://${RTSP_USER}:${RTSP_PASS}@192.168.178.147:554/h264Preview_01_sub
            roles:
            - detect
        detect:
          width: 640
          height: 480
          fps: 5
      overkapping:
        ffmpeg:
          inputs:
          - path: rtsp://${RTSP_USER}:${RTSP_PASS}@192.168.178.239:554/h264Preview_01_main
            roles:
            - record
          - path: rtsp://${RTSP_USER}:${RTSP_PASS}@192.168.178.239:554/h264Preview_01_sub
            roles:
            - detect
        detect:
          width: 640
          height: 480
          fps: 5
      achtertuin:
        ffmpeg:
          inputs:
          - path: rtsp://${RTSP_USER}:${RTSP_PASS}@192.168.178.18:554/h264Preview_01_main
            roles:
            - record
          - path: rtsp://${RTSP_USER}:${RTSP_PASS}@192.168.178.18:554/h264Preview_01_sub
            roles:
            - detect
        detect:
          width: 640
          height: 480
          fps: 5
