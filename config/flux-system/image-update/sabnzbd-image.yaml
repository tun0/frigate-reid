---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: sabnzbd-image
  namespace: flux-system
spec:
  image: lscr.io/linuxserver/sabnzbd
  interval: 1h0m0s
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: sabnzbd-policy
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: sabnzbd-image
  policy:
    semver:
      range: ^5
