---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: cloudflared-image
  namespace: flux-system
spec:
  image: cloudflare/cloudflared
  interval: 1h0m0s
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: cloudflared-policy
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: cloudflared-image
  policy:
    semver:
      range: ">=2024.0.0"
