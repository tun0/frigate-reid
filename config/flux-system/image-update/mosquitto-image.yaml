---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: mosquitto-image
  namespace: flux-system
spec:
  image: eclipse-mosquitto
  interval: 1h0m0s
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: mosquitto-policy
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: mosquitto-image
  filterTags:
    pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
  policy:
    semver:
      range: '>=2.0.0'
