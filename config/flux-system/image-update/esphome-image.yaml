---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: esphome-image
  namespace: flux-system
spec:
  image: esphome/esphome
  interval: 1h0m0s
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: esphome-policy
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: esphome-image
  policy:
    semver:
      range: ">=2024.0.0"
