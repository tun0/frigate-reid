---
apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImageRepository
metadata:
  name: sonarr-image
  namespace: flux-system
spec:
  image: linuxserver/sonarr
  interval: 1h0m0s
---
apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImagePolicy
metadata:
  name: sonarr-policy
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: sonarr-image
  policy:
    semver:
      range: ^3
