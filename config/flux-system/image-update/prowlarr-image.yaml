---
apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImageRepository
metadata:
  name: prowlarr-image
  namespace: flux-system
spec:
  image: linuxserver/prowlarr
  interval: 5m0s
---
apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImagePolicy
metadata:
  name: prowlarr-policy
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: prowlarr-image
  filterTags:
    pattern: '^develop-version-[0-9]+.[0-9]+.[0-9]+.(?P<n>[0-9]+)'
    extract: '$n'
  policy:
    numerical:
      order: asc
