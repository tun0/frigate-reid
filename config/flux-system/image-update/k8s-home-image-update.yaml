---
apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImageUpdateAutomation
metadata:
  name: k8s-home
  namespace: flux-system
spec:
  git:
    checkout:
      ref:
        branch: master
    commit:
      messageTemplate: |
        Automated image update

        Automation name: {{ .AutomationObject }}

        {{ $files := .Updated.Files -}}
        Files:
        {{ range $filename, $_:= .Updated.Files -}}
        - {{ $filename }}
          - {{ index $files $filename }}
        {{ end -}}

        Objects:
        {{ range $resource, $_ := .Updated.Objects -}}
        - {{ $resource.Kind }}/{{ $resource.Name }}: {{ $_ }}
        {{ end -}}

        Images:
        {{ range .Updated.Images -}}
        - {{ . }}
        {{ end -}}

        Updates:
        {{ range $file, $fileresult := .Updated.Files -}}
        - {{ $file }}: {{ $fileresult }} / {{ $fileresult.Objects }}
          {{ range $object, $imageref := $fileresult.Objects -}}
          - {{ $object.Kind }}/{{ $object.Name }} / {{ $imageref }}
          {{ end -}}
        {{ end -}}
      author:
        email: fluxbot@tun0.nl
        name: FluxBot
  interval: 5m0s
  sourceRef:
    kind: GitRepository
    name: k8s-home
