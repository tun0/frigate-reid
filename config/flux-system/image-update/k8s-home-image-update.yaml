---
apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImageUpdateAutomation
metadata:
  name: k8s-home
  namespace: flux-system
spec:
  git:
    checkout:
      ref:
        branch: master
    commit:
      messageTemplate: |
        Automated image update

        Automation name: {{ .AutomationObject }}

        Updates:
        {{ range $file, $fileresult := .Updated.Files -}}
          File: {{ $file }}
        {{ range $object, $imagerefs := $fileresult.Objects -}}
            Kind: {{ $object.APIVersion }}/{{ $object.Kind }}
            Name: {{ $object.Namespace }}/{{ $object.Name }}
        {{ range $imageref := $imagerefs -}}
              Image: {{ $imageref.Name }}
        {{ end -}}
        {{ end -}}
        {{ end -}}

        YAML:
        {{ range $file, $fileresult := .Updated.Files -}}
        ---
        filename: {{ $file }}
        objects:
        {{ range $object, $imagerefs := $fileresult.Objects -}}
        -
          apiVersion: {{ $object.APIVersion }}
          kind: {{ $object.Kind }}
          name: {{ $object.Name }}
          namespace: {{ $object.Namespace }}
          images:
        {{ range $imageref := $imagerefs }}
          - {{ $imageref.Name }}
        {{ end -}}
        {{ end -}}
        {{ end -}}

      author:
        email: fluxbot@tun0.nl
        name: FluxBot
  interval: 5m0s
  sourceRef:
    kind: GitRepository
    name: k8s-home
