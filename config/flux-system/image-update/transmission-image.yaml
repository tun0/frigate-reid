---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: transmission-image
  namespace: flux-system
spec:
  image: haugene/transmission-openvpn
  interval: 1h0m0s
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: transmission-policy
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: transmission-image
  policy:
    semver:
      range: ^4.0
