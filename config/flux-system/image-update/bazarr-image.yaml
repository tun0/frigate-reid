---
apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImageRepository
metadata:
  name: bazarr-image
  namespace: flux-system
spec:
  image: linuxserver/bazarr
  interval: 1h0m0s
---
apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImagePolicy
metadata:
  name: bazarr-policy
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: bazarr-image
  policy:
    semver:
      range: ^1.0
