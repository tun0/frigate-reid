---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: radarr-image
  namespace: flux-system
spec:
  image: linuxserver/radarr
  interval: 1h0m0s
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: radarr-policy
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: radarr-image
  filterTags:
    pattern: '^develop-version-[0-9]+.[0-9]+.[0-9]+.(?P<n>[0-9]+)'
    extract: '$n'
  policy:
    numerical:
      order: asc
