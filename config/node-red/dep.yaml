apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-red
  namespace: node-red
  labels:
    app: node-red
spec:
  selector:
    matchLabels:
      app: node-red
  template:
    metadata:
      labels:
        app: node-red
    spec:
      dnsConfig:
        options:
        - name: ndots
          value: "1"
      containers:
      - name: node-red
        image: nodered/node-red:5.0.1 # {"$imagepolicy": "flux-system:node-red-policy"}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 1880
          name: http
          protocol: TCP
        resources: {}
        volumeMounts:
        - name: nfs-mercury-mnt
          mountPath: /data
          subPath: usb2/K8S/APPS/node-red/data/
        - name: nfs-mercury-mnt
          mountPath: /mnt
      volumes:
      - name: nfs-mercury-mnt
        nfs:
          server: 192.168.178.1
          path: /mnt
