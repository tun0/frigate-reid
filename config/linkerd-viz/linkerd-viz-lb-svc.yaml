---
kind: Service
apiVersion: v1
metadata:
  name: web-lb
  namespace: linkerd-viz
  labels:
    linkerd.io/extension: viz
    component: web
    namespace: linkerd-viz
  annotations:
    linkerd.io/inject: enabled
spec:
  selector:
    linkerd.io/extension: viz
    component: web
  ports:
  - name: http
    port: 80
    targetPort: 8084
  type: LoadBalancer
  loadBalancerIP: 192.168.178.212
  externalTrafficPolicy: Local
