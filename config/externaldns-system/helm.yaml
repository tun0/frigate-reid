---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: external-dns
  namespace: externaldns-system
spec:
  interval: 1h
  url: https://kubernetes-sigs.github.io/external-dns/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: externaldns-system
spec:
  chart:
    spec:
      chart: external-dns
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: external-dns
      version: 1.20.0
  interval: 1h0m0s
  releaseName: external-dns
  values:
    domainFilters:
    - local.tun0.eu
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-key
            key: CF_API_TOKEN
    extraArgs:
    - --zone-id-filter=26396c44703f98c7bf4402b4532acd92
    - --cloudflare-dns-records-per-page=5000
    policy: sync
    provider:
      name: cloudflare
    sources:
    - service
